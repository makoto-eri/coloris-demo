<script>
var view=document.getElementById('view');
function show(n){
  view.srcdoc=document.getElementById('t'+n).textContent;
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++){tabs[i].classList.toggle('active',tabs[i].getAttribute('data-t')==n);}
}
var tabs=document.querySelectorAll('.tab');
for(var i=0;i<tabs.length;i++){tabs[i].addEventListener('click',function(){show(this.getAttribute('data-t'));});}
show(1);
</script>
